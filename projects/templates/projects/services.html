{% extends 'projects/base.html' %}

{% block title %}Services — {{ firm.company.name }}{% endblock %}

{% block content %}
<section class="max-w-7xl mx-auto px-6 md:px-12 pt-24 pb-16 md:pt-32">
    <h1 class="serif text-4xl md:text-6xl">What we do</h1>
</section>

<section class="max-w-7xl mx-auto px-6 md:px-12 pb-32">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-16">
        {% for service in firm.services %}
        <article class="fade-in">
            <h2 class="serif text-2xl md:text-3xl">{{ service.name }}</h2>
            <p class="text-muted mt-4 leading-relaxed">{{ service.description }}</p>
        </article>
        {% empty %}
        <p class="text-muted">No services configured.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
